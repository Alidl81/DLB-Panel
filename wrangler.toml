name = "dlb-panel"
main = "zeus.js"
compatibility_date = "2024-02-08"

# بعد از ساخت دیتابیس D1 مقدار database_id را جایگزین کن.
[[d1_databases]]
binding = "DB"
database_name = "dlb-db"
database_id = "PUT_YOUR_D1_DATABASE_ID_HERE"

# بهتر است Secretها با wrangler secret put تنظیم شوند، نه داخل فایل.
# wrangler secret put CF_API_TOKEN
# wrangler secret put CF_ACCOUNT_ID
